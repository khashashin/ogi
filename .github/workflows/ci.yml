name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Lint, Type, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --locked --extra dev

      - name: Run backend lint
        run: uv run --extra dev ruff check ogi/api/router.py ogi/main.py ogi/config.py

      - name: Run backend type checks
        run: uv run --extra dev mypy --follow-imports=skip ogi/api/router.py

      - name: Run backend tests
        run: uv run --extra dev pytest -q

  frontend:
    name: Frontend Test, Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test -- --run

      - name: Lint frontend
        run: pnpm lint

      - name: Build frontend
        run: pnpm build
