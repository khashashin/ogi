name: Release Version Sync

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3 or 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$MANUAL_TAG"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is empty"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync versions from tag
        env:
          TAG_NAME: ${{ steps.resolve.outputs.tag }}
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path
          import os
          import sys

          tag = os.environ["TAG_NAME"].strip()
          match = re.fullmatch(r"v?(\d+\.\d+\.\d+)", tag)
          if not match:
              print(f"Invalid tag format: {tag}. Expected vX.Y.Z or X.Y.Z")
              sys.exit(1)
          version = match.group(1)
          print(f"Resolved release version: {version}")

          pyproject = Path("backend/pyproject.toml")
          lines = pyproject.read_text(encoding="utf-8").splitlines()
          in_project = False
          replaced = False
          for idx, line in enumerate(lines):
              stripped = line.strip()
              if stripped == "[project]":
                  in_project = True
                  continue
              if in_project and stripped.startswith("[") and stripped != "[project]":
                  in_project = False
              if in_project and re.match(r"^version\s*=\s*\".*\"$", stripped):
                  lines[idx] = f'version = "{version}"'
                  replaced = True
                  break

          if not replaced:
              print("Could not find [project] version in backend/pyproject.toml")
              sys.exit(1)
          pyproject.write_text("\n".join(lines) + "\n", encoding="utf-8")

          package_json = Path("frontend/package.json")
          package_data = json.loads(package_json.read_text(encoding="utf-8"))
          package_data["version"] = version
          package_json.write_text(json.dumps(package_data, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit and push if changed
        env:
          VERSION_TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          if git diff --quiet -- backend/pyproject.toml frontend/package.json; then
            echo "No version changes to commit."
            exit 0
          fi

          VERSION="${VERSION_TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/pyproject.toml frontend/package.json
          git commit -m "chore(release): sync versions to ${VERSION} [skip ci]"
          git push origin HEAD:main
