services:
  backend:
    image: ${OGI_BACKEND_IMAGE:-ghcr.io/khashashin/ogi-backend}:${OGI_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./plugins:/app/plugins
    environment:
      - OGI_DATABASE_URL=${OGI_DATABASE_URL}
      - OGI_USE_SQLITE=false
      - OGI_GITHUB_TOKEN=${OGI_GITHUB_TOKEN:-}
      - OGI_SUPABASE_URL=${OGI_SUPABASE_URL}
      - OGI_SUPABASE_ANON_KEY=${OGI_SUPABASE_ANON_KEY}
      - OGI_REDIS_URL=redis://redis:6379/0

  worker:
    image: ${OGI_WORKER_IMAGE:-ghcr.io/khashashin/ogi-worker}:${OGI_IMAGE_TAG:-latest}
    pull_policy: always
    command: ["python", "-m", "ogi.worker.run_worker"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./plugins:/app/plugins
    environment:
      - OGI_DATABASE_URL=${OGI_DATABASE_URL}
      - OGI_USE_SQLITE=false
      - OGI_REDIS_URL=redis://redis:6379/0

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: ${OGI_FRONTEND_IMAGE:-ghcr.io/khashashin/ogi-frontend}:${OGI_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      - VITE_SUPABASE_URL=${OGI_SUPABASE_URL:-}
      - VITE_SUPABASE_ANON_KEY=${OGI_SUPABASE_ANON_KEY:-}
      - VITE_SUPABASE_REDIRECT_URL=${OGI_SUPABASE_REDIRECT_URL:-}
    ports:
      - "80" # Coolify Traefik proxy will route the configured domain to this port
    depends_on:
      - backend
