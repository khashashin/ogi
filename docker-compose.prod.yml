services:
  backend:
    image: ${OGI_BACKEND_IMAGE:-ghcr.io/khashashin/ogi-backend}:${OGI_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ogi_plugins:/app/plugins
    environment:
      - OGI_DATABASE_URL=${OGI_DATABASE_URL}
      - OGI_USE_SQLITE=false
      - OGI_GITHUB_TOKEN=${OGI_GITHUB_TOKEN:-}
      - OGI_SUPABASE_URL=${OGI_SUPABASE_URL}
      - OGI_SUPABASE_ANON_KEY=${OGI_SUPABASE_ANON_KEY}
      - OGI_REDIS_URL=redis://redis:6379/0
      - OGI_RUN_DB_MIGRATIONS=true
      - OGI_AUTO_RUN_MIGRATIONS=false
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: ${OGI_WORKER_IMAGE:-ghcr.io/khashashin/ogi-worker}:${OGI_IMAGE_TAG:-latest}
    pull_policy: always
    command: ["python", "-m", "ogi.worker.run_worker"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ogi_plugins:/app/plugins
    environment:
      - OGI_DATABASE_URL=${OGI_DATABASE_URL}
      - OGI_USE_SQLITE=false
      - OGI_REDIS_URL=redis://redis:6379/0
      - OGI_RUN_DB_MIGRATIONS=false
      - OGI_AUTO_RUN_MIGRATIONS=false

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: ${OGI_FRONTEND_IMAGE:-ghcr.io/khashashin/ogi-frontend}:${OGI_IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    environment:
      - VITE_SUPABASE_URL=${OGI_SUPABASE_URL:-}
      - VITE_SUPABASE_ANON_KEY=${OGI_SUPABASE_ANON_KEY:-}
      - VITE_SUPABASE_REDIRECT_URL=${OGI_SUPABASE_REDIRECT_URL:-}
    ports:
      - "80" # Coolify Traefik proxy will route the configured domain to this port
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  ogi_plugins:
